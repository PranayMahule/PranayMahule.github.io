<!DOCTYPE html>
<html lang="en">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #050505; --accent: #7c3aed; --text: #ffffff; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; display: flex; flex-direction: column; }
        nav { padding: 2rem 10%; display: flex; justify-content: space-between; }

        h1 { font-size: 5rem; font-weight: 900; margin-bottom: 4rem; }
        
        .contact-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 2.5rem; width: 100%; max-width: 1200px; }
        .contact-card { background: #0c0c0c; border: 1px solid #222; padding: 4rem; border-radius: 40px; text-decoration: none; color: white; transition: 0.4s; text-align: center; }
        .contact-card:hover { border-color: var(--accent); background: #111; transform: translateY(-10px); }
        .contact-card i { font-size: 3.5rem; color: var(--accent); margin-bottom: 2rem; }
        .contact-card h3 { font-size: 1.8rem; margin-bottom: 0.5rem; }
        .contact-card p { color: #a1a1aa; font-size: 1.1rem; }
    </style>
</head>
