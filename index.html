<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pranay Mahule | Software Engineer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050507;
            --surface: #0d0d12;
            --accent: #7c3aed;
            --accent-glow: rgba(124, 58, 237, 0.25);
            --accent2: #06b6d4;
            --text: #f0f0f5;
            --muted: #52525b;
            --border: rgba(255,255,255,0.06);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Background grid */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(124,58,237,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(124,58,237,0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
            z-index: 0;
        }

        /* Glow orb */
        body::after {
            content: '';
            position: fixed;
            top: -200px;
            left: 50%;
            transform: translateX(-50%);
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, rgba(124,58,237,0.12) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            padding: 1.5rem 8%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            border-bottom: 1px solid var(--border);
            background: rgba(5,5,7,0.8);
            backdrop-filter: blur(20px);
        }

        .logo {
            font-family: 'Syne', sans-serif;
            font-weight: 900;
            font-size: 1.4rem;
            letter-spacing: -0.5px;
            color: var(--text);
        }
        .logo span { color: var(--accent); }

        .nav-links {
            display: flex;
            gap: 0.25rem;
        }
        .nav-links a {
            color: var(--muted);
            text-decoration: none;
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 0.72rem;
            letter-spacing: 1.5px;
            padding: 0.5rem 1rem;
            border-radius: 100px;
            transition: all 0.2s;
        }
        .nav-links a:hover, .nav-links a.active {
            color: var(--text);
            background: rgba(255,255,255,0.06);
        }

        /* Hero */
        .hero {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 8rem 5% 4rem;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(6, 182, 212, 0.08);
            border: 1px solid rgba(6, 182, 212, 0.2);
            color: var(--accent2);
            font-size: 0.78rem;
            font-weight: 500;
            letter-spacing: 0.5px;
            padding: 0.4rem 1rem;
            border-radius: 100px;
            margin-bottom: 2.5rem;
            animation: fadeUp 0.6s ease both;
        }
        .status-dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: var(--accent2);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
        }

        .pfp-frame {
            width: 200px; height: 200px;
            border-radius: 50%;
            padding: 3px;
            background: conic-gradient(from 0deg, var(--accent), var(--accent2), var(--accent));
            margin-bottom: 2.5rem;
            box-shadow: 0 0 60px var(--accent-glow);
            animation: fadeUp 0.6s 0.1s ease both;
        }
        .pfp-inner {
            width: 100%; height: 100%;
            border-radius: 50%;
            overflow: hidden;
            background: var(--surface);
        }
        .pfp-inner img {
            width: 100%; height: 100%;
            object-fit: cover;
            object-position: center 20%;
        }

        h1 {
            font-family: 'Syne', sans-serif;
            font-size: clamp(3.5rem, 11vw, 7rem);
            font-weight: 900;
            line-height: 0.95;
            letter-spacing: -3px;
            margin-bottom: 1.5rem;
            animation: fadeUp 0.7s 0.2s ease both;
        }
        h1 .accent { color: var(--accent); }
        h1 .outline {
            -webkit-text-stroke: 2px rgba(124,58,237,0.6);
            color: transparent;
        }

        .tagline {
            font-size: 1.1rem;
            color: var(--muted);
            max-width: 520px;
            line-height: 1.7;
            margin-bottom: 3rem;
            animation: fadeUp 0.7s 0.3s ease both;
        }

        .cta-group {
            display: flex;
            gap: 1rem;
            animation: fadeUp 0.7s 0.4s ease both;
        }
        .btn-primary {
            padding: 0.9rem 2.5rem;
            background: var(--accent);
            color: white;
            text-decoration: none;
            border-radius: 100px;
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
            transition: all 0.3s;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 40px var(--accent-glow);
        }
        .btn-ghost {
            padding: 0.9rem 2.5rem;
            background: transparent;
            color: var(--muted);
            text-decoration: none;
            border-radius: 100px;
            border: 1px solid var(--border);
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
            transition: all 0.3s;
        }
        .btn-ghost:hover {
            color: var(--text);
            border-color: rgba(255,255,255,0.15);
        }

        /* Scroll indicator */
        .scroll-hint {
            position: absolute;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
            color: var(--muted);
            font-size: 0.72rem;
            letter-spacing: 2px;
            font-family: 'Syne', sans-serif;
            animation: fadeUp 1s 0.8s ease both;
        }
        .scroll-line {
            width: 1px; height: 40px;
            background: linear-gradient(to bottom, var(--accent), transparent);
            animation: scrollLine 1.5s ease-in-out infinite;
        }
        @keyframes scrollLine {
            0% { transform: scaleY(0); transform-origin: top; }
            50% { transform: scaleY(1); transform-origin: top; }
            51% { transform: scaleY(1); transform-origin: bottom; }
            100% { transform: scaleY(0); transform-origin: bottom; }
        }

        /* Stats bar */
        .stats-bar {
            position: relative;
            z-index: 1;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: center;
        }
        .stats-inner {
            max-width: 900px;
            width: 100%;
            padding: 2.5rem 5%;
            display: flex;
            justify-content: space-around;
            gap: 2rem;
        }
        .stat {
            text-align: center;
        }
        .stat-num {
            font-family: 'Syne', sans-serif;
            font-size: 2.2rem;
            font-weight: 900;
            color: var(--text);
        }
        .stat-num span { color: var(--accent); }
        .stat-label {
            font-size: 0.75rem;
            color: var(--muted);
            letter-spacing: 1px;
            margin-top: 0.25rem;
            font-family: 'Syne', sans-serif;
            font-weight: 700;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <nav>
        <div class="logo">PRANAY<span>_</span></div>
        <div class="nav-links">
            <a href="index.html" class="active">HOME</a>
            <a href="about.html">ABOUT</a>
            <a href="education.html">EDUCATION</a>
            <a href="contact.html">CONTACT</a>
        </div>
    </nav>

    <section class="hero">
        <div class="status-badge">
            <div class="status-dot"></div>
            Available for opportunities
        </div>
        <div class="pfp-frame">
            <div class="pfp-inner">
                <img src="1776708958346.jpg" alt="Pranay Mahule">
            </div>
        </div>
        <h1>
            SOFTWARE<br>
            <span class="outline">ENGI</span><span class="accent">NEER</span>
        </h1>
        <p class="tagline">Building robust digital architectures and high-performance systems with a focus on full-stack innovation.</p>
        <div class="cta-group">
            <a href="about.html" class="btn-primary">Learn More</a>
            <a href="contact.html" class="btn-ghost">Get in Touch</a>
        </div>
        <div class="scroll-hint">
            <div class="scroll-line"></div>
            SCROLL
        </div>
    </section>

    <div class="stats-bar">
        <div class="stats-inner">
            <div class="stat">
                <div class="stat-num">MERN<span>+</span></div>
                <div class="stat-label">STACK</div>
            </div>
            <div class="stat">
                <div class="stat-num">Full<span>.</span></div>
                <div class="stat-label">STACK</div>
            </div>
            <div class="stat">
                <div class="stat-num">Clean<span>_</span></div>
                <div class="stat-label">ARCHITECTURE</div>
            </div>
        </div>
    </div>
</body>
</html>
