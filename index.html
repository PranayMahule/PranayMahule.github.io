<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pranay Mahule | Software Engineer</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #030303; --accent: #7c3aed; --text: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }
        
        nav { padding: 2rem 10%; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; background: rgba(3,3,3,0.9); backdrop-filter: blur(10px); z-index: 100; }
        .logo { font-weight: 900; font-size: 1.8rem; letter-spacing: -1px; }
        .nav-links a { color: #71717a; text-decoration: none; margin-left: 2rem; font-weight: 700; font-size: 0.8rem; transition: 0.3s; }
        .nav-links a:hover { color: var(--accent); }

        .hero { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 4rem 5%; }
        .pfp-frame { width: 280px; height: 280px; border-radius: 50%; padding: 5px; background: linear-gradient(135deg, var(--accent), #3b82f6); margin-bottom: 2rem; box-shadow: 0 0 50px rgba(124, 58, 237, 0.3); }
        .pfp-inner { width: 100%; height: 100%; border-radius: 50%; overflow: hidden; }
        .pfp-inner img { width: 100%; height: 100%; object-fit: cover; object-position: center 20%; }

        h1 { font-size: clamp(3rem, 10vw, 6rem); font-weight: 900; line-height: 1; margin-bottom: 1.5rem; }
        .hero-tagline { font-size: 1.4rem; color: #a1a1aa; max-width: 700px; margin-bottom: 3rem; }
        .cta-btn { padding: 1.2rem 3.5rem; background: var(--accent); color: white; text-decoration: none; border-radius: 100px; font-weight: 800; transition: 0.4s; }
        .cta-btn:hover { transform: scale(1.05); box-shadow: 0 10px 30px rgba(124, 58, 237, 0.4); }
    </style>
</head>
<body>
    <nav>
        <div class="logo">PRANAY<span style="color:var(--accent)">_</span></div>
        <div class="nav-links">
            <a href="index.html" style="color:white">HOME</a>
            <a href="about.html">ABOUT</a>
            <a href="education.html">EDUCATION</a>
            <a href="contact.html">CONTACT</a>
        </div>
    </nav>
    <section class="hero">
        <div class="pfp-frame"><div class="pfp-inner"><img src="1776708958346.jpg" alt="Pranay"></div></div>
        <h1>SOFTWARE<br><span style="color: var(--accent)">ENGINEER</span></h1>
        <p class="hero-tagline">Developing robust digital architectures and high-performance system solutions with a focus on full-stack innovation.</p>
        <a href="about.html" class="cta-btn">LEARN MORE</a>
    </section>
</body>
</html>
