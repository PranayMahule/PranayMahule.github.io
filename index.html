<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pranay Mahule | Home</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #050505; --accent: #7c3aed; --text: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg); color: var(--text); }
        nav { padding: 2rem 5%; display: flex; justify-content: space-between; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .nav-links a { color: #a1a1aa; text-decoration: none; margin-left: 2rem; font-size: 0.9rem; }
        .nav-links a:hover { color: var(--accent); }
        
        .hero { height: 80vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 0 10%; }
        
        /* FIXED PHOTO: Face focus */
        .pfp-container {
            width: 280px; height: 280px; border-radius: 50%;
            border: 4px solid var(--accent); overflow: hidden; margin-bottom: 2rem;
            box-shadow: 0 0 50px rgba(124, 58, 237, 0.3);
        }
        .pfp-container img {
            width: 100%; height: 100%;
            object-fit: cover;
            object-position: 50% 15%; /* Forces the focus on the upper part of the image (the face) */
        }

        h1 { font-size: 5rem; font-weight: 900; letter-spacing: -3px; }
        .btn { margin-top: 2rem; padding: 1rem 2.5rem; background: var(--accent); color: white; text-decoration: none; border-radius: 50px; font-weight: 700; transition: 0.3s; }
        .btn:hover { transform: scale(1.05); box-shadow: 0 0 30px var(--accent); }
    </style>
</head>
<body>
    <nav>
        <div style="font-weight: 800; color: var(--accent);">PRANAY MAHULE</div>
        <div class="nav-links">
            <a href="index.html">HOME</a>
            <a href="about.html">BIOGRAPHY</a>
            <a href="education.html">COLLEGE</a>
            <a href="contact.html">CONTACT</a>
        </div>
    </nav>
    <section class="hero">
        <div class="pfp-container">
            <img src="1776708958346.jpg" alt="Pranay Mahule">
        </div>
        <h1>SOFTWARE<br><span style="color: var(--accent)">ENGINEER</span></h1>
        <p style="color: #a1a1aa; max-width: 600px; margin-top: 1rem; font-size: 1.2rem;">Building high-performance systems and scalable full-stack applications.</p>
        <a href="about.html" class="btn">VIEW BIOGRAPHY</a>
    </section>
</body>
</html>
